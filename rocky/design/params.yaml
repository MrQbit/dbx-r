# ROCKY-5 design parameters (ROBOTS_SPEC.md §4). Every number here is law.
# Pentaradial Eridian, 50% scale. Radially symmetric: 5 identical limbs at 72deg.
# The URDF generator instances limb 0 at 72deg increments; a symmetry unit test
# asserts identical link inertias across limbs (tests/test_symmetry.py).

robot: rocky
scale: 0.5
limb_count: 5
limb_angle_deg: 72            # limb 0 = heading (0deg), then +72 each

# --- Canonical dimensions (§4), millimetres --------------------------------
# TIGHTENED to smallest-that-fits (D-014): carapace 220->165 mm (x0.75). Shorter
# leg levers keep the cheaper EduLite-05 servos torque-valid (D-013); shell now
# fits the 250 mm print envelope in one piece and hides the electronics. Mass is
# motor-dominated (~4 kg of 17 servos) so it stays ~5 kg even at this size.
dimensions:
  carapace_dia_mm: 180         # nudged 165->180 for fan+Jetson+battery packing (D-021)
  dome_height_mm: 100          # nudged 88->100 for Jetson clearance under the dome apex
  limb_reach_mm: 186
  coxa_mm: 41
  femur_mm: 72
  tibia_mm: 72
  stance_height_mm: 134        # neutral
  footprint_dia_mm: 320
  foot_dia_mm: 19              # TPU hemispherical

mass_budget_kg: 6.5           # realistic: 17 EduLite (~4.1 kg) dominate; parts @~30%
#                               infill (~1.3 kg) + electronics (~0.5 kg) ~= 6.0 kg (D-026)
design_target_kg: 6.0         # G1 torque check + TRAINING mass — matches the real build
#                               (was 5.0 aspiration; servo mass is unavoidable). Torque
#                               still clears with huge margin (0.96 vs 1.8 N·m continuous).

battery:                       # 6S for the 48V-class EduLite QDD motors (D-022 power fix)
  chemistry: li-ion
  cells: 6                      # was 3S/12V — under-volted the 15-60V (rated 48V) motors
  nominal_v: 22.2               # 6S Li-ion; well within EduLite 15-60V, ample for <1 Nm loads
  capacity_mah_min: 3500
  connector: XT60
  bms: true
  bay_mm: [85, 40, 25]         # 6S pack (was 70x38x20)
  bay_foam_tolerance_mm: 2
  # NOTE: 6S (22V) is the practical pick — Rocky's worst case is 0.8 Nm so it needs
  # nowhere near 48V; for max rated servo performance a 12-13S (44-48V) pack drops in.

# --- Degrees of freedom (15, §4): per limb i in 0..4 -----------------------
# Servo IDs = 3i+1, 3i+2, 3i+3. Generated from the template below by the
# description pipeline; listed here explicitly so params are self-contained.
dof_template:                  # per-limb joints (i substituted 0..4)
  - {suffix: coxa_yaw,     offset: 1, limit_rad: [-0.9,  0.9]}
  - {suffix: femur_pitch,  offset: 2, limit_rad: [-1.4,  1.0]}
  - {suffix: tibia_pitch,  offset: 3, limit_rad: [-0.3,  2.0]}

# Front manipulators (D-008): the 2 legs flanking heading limb 0 get a 3-finger
# grip hand that doubles as a foot (grip open = flat foot). Extra DOF, IDs 16-17,
# appended after the 15 leg joints. Movie: Rocky manipulates with its front pair.
manipulators:
  legs: [1, 4]                 # symmetric about the +X heading (limb 0)
  grip_limit_rad: [0.0, 1.4]   # 0 = open/flat (stand), 1.4 = closed (grasp)
  servo_ids: [16, 17]
  fingers: 3                   # triangular stony fingers (driven together)

# --- Actuator (Robstride EduLite 05, D-013) --------------------------------
# Switched from RS00 to EduLite 05: the RS00 (14/17 Nm) was ~3x over-specced for a
# 5-legged 5 kg robot; EduLite 05 (1.8 rated / 6 peak) is torque-valid at the
# tightened size (shorter femur lever) and SIGNIFICANTLY cheaper (~$80). NOTE:
# BDX-A CANNOT use these (its hips need 42 Nm) — Rocky-only. Servo change means the
# RL policy must retrain with effort_limit 6 (queued after the current run).
servo:
  model: robstride_edulite05
  voltage_v: 48                # EduLite rated 48 V (15-60 V)
  gear_ratio: 9                # 9:1 planetary
  torque_continuous_nm: 1.8    # rated
  torque_stall_nm: 6.0         # peak
  bus: {type: canbus}
  kp: 40
  kd: 2.0
  effort_clamp_nm: 6.0
  vel_clamp_rad_s: 15.0
  armature: 0.02
  friction: 0.03

# --- Torque check (§4): femur worst case at the tightened size --------------
# Real static worst case at 72 mm femur / ~5 kg / dynamic 2x ~= 0.8 Nm (was a
# conservative 1.8 for the larger robot). EduLite 1.8 cont / 6 peak clears it.
torque_check:
  femur_worst_case_nm: 0.8
  continuous_margin: 1.8
  stall_margin: 3.0

# --- Carapace procedural displacement (§4) ---------------------------------
carapace:
  material: PLA
  pieces: 2
  # amp/freq raised from spec's 1.2/0.08 (imperceptible at this scale) for a
  # visibly craggy "made of rocks" look (D-009, movie accuracy).
  noise: {type: simplex, amp_mm: 3.5, freq_per_mm: 0.13, faces: outer_only}

# --- Audio (§4 / §7): chord voice ------------------------------------------
audio:
  driver_mm: 40
  amp: MAX98357A
  bus: i2s
  grilles: 5                   # slotted sound grilles in skirt

# --- IMU (§4): at centroid -------------------------------------------------
imu:
  model: BNO055
  bus: i2c-7
  mount: centroid
  forward_axis: "+X"           # limb 0 heading
