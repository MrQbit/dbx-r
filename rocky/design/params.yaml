# ROCKY-5 design parameters (ROBOTS_SPEC.md §4). Every number here is law.
# Pentaradial Eridian, 50% scale. Radially symmetric: 5 identical limbs at 72deg.
# The URDF generator instances limb 0 at 72deg increments; a symmetry unit test
# asserts identical link inertias across limbs (tests/test_symmetry.py).

robot: rocky
scale: 0.5
limb_count: 5
limb_angle_deg: 72            # limb 0 = heading (0deg), then +72 each

# --- Canonical dimensions (§4), millimetres --------------------------------
# MOVIE PROPORTIONS (D-028): reverted the tighten-down. The build now DERIVES from
# the official Rocky STL (reference/stl/rocky_normalized.stl) at its native ~272 mm
# thorax — the tightened 180 mm parametric parts looked like a boxy tripod, not the
# organic pentaradial Eridian. At movie size the organic legs are thick enough to
# hide the servos, but the longer levers need Robstride RS00 (EduLite fails torque).
dimensions:                    # RECONCILED to the OFFICIAL SCULPT (D-034): the printed
  # robot is derived 1:1 from the official Rocky figure (reference/self_print_rocky),
  # segmented + symmetric-reposed in Blender. These are the ACTUAL built dimensions —
  # train what you print. The chunky official body (191mm) fits the Jetson easily
  # (11mm walls); the shorter sculpt legs make EduLite comfortable again (2.3x margin).
  carapace_dia_mm: 191         # official pentagonal thorax (holds Jetson+battery)
  dome_height_mm: 138
  limb_reach_mm: 201           # hip r86 -> foot r201
  coxa_mm: 60
  femur_mm: 73                 # sculpt-derived (shorter -> low torque -> EduLite comfy)
  tibia_mm: 105
  stance_height_mm: 145        # hip z; foot 64mm below hip
  footprint_dia_mm: 402        # sculpt-accurate (NOT stretched to an arbitrary target)
  foot_dia_mm: 35             # sculpt-native craggy claw / 3-finger tip

mass_budget_kg: 6.5           # KEEP LIGHT: 15 EduLite (~3.6kg) + micro grips + hollow STL
#                               shell + electronics ~= 5.9kg. Above ~6kg EduLite is over.
design_target_kg: 5.9         # G1 + TRAINING mass at x1.2

battery:                       # 6S for the 48V-class EduLite QDD motors (D-022 power fix)
  chemistry: li-ion
  cells: 6                      # was 3S/12V — under-volted the 15-60V (rated 48V) motors
  nominal_v: 22.2               # 6S Li-ion; well within EduLite 15-60V, ample for <1 Nm loads
  capacity_mah_min: 3500
  connector: XT60
  bms: true
  bay_mm: [85, 40, 25]         # 6S pack (was 70x38x20)
  bay_foam_tolerance_mm: 2
  # NOTE: 6S (22V) is the practical pick — Rocky's worst case is 0.8 Nm so it needs
  # nowhere near 48V; for max rated servo performance a 12-13S (44-48V) pack drops in.

# --- Degrees of freedom (15, §4): per limb i in 0..4 -----------------------
# Servo IDs = 3i+1, 3i+2, 3i+3. Generated from the template below by the
# description pipeline; listed here explicitly so params are self-contained.
dof_template:                  # per-limb joints (i substituted 0..4)
  - {suffix: coxa_yaw,     offset: 1, limit_rad: [-0.9,  0.9]}
  - {suffix: femur_pitch,  offset: 2, limit_rad: [-1.4,  1.0]}
  - {suffix: tibia_pitch,  offset: 3, limit_rad: [-0.3,  2.0]}

# Manipulators (D-028, canon-corrected): EVERY limb ends in a 3-finger hand (book:
# "on each limb, three triangular fingers") — not just the front pair. All 5 legs are
# hand-feet (grip open = flat foot to stand; closed = grasp). 5 grip DOF, IDs 16-20,
# appended after the 15 leg joints -> 20 DOF total. Rocky is pentadextrous.
manipulators:
  legs: [0, 1, 2, 3, 4]        # ALL five limbs
  grip_limit_rad: [0.0, 2.2]   # 0 = open/flat foot (stand); 2.2 rad (126°) = fingers
  #                              pass vertical into a firm 3-jaw grasp (D-027).
  servo_ids: [16, 17, 18, 19, 20]
  fingers: 3                   # triangular stony fingers per hand (driven together)
  grip_servo: grip_micro       # low-load fingers -> small servo, NOT a leg QDD

# --- Leg actuator (Robstride EduLite 05, D-031) ----------------------------
# Back to EduLite (my RS00 detour was over-conservative — EduLite holds the 272mm leg
# at ~72% continuous with 3.3x peak headroom). Ø46 (vs RS00 Ø60) also gives a slenderer
# leg-neck knuckle. Valid ONLY because the body is kept LIGHT (design_target 5.5kg).
servo:
  model: robstride_edulite05
  voltage_v: 48
  gear_ratio: 9
  torque_continuous_nm: 1.8
  torque_stall_nm: 6.0
  bus: {type: canbus}
  kp: 40
  kd: 2.0
  effort_clamp_nm: 6.0
  vel_clamp_rad_s: 15.0
  armature: 0.02
  friction: 0.03

# --- Grip actuator (small servo, D-028) — the 3 fingers per hand are low-load ----
grip_servo:
  model: grip_micro            # MG90S/EduLite-class metal-gear micro servo
  torque_continuous_nm: 0.4
  torque_stall_nm: 1.8
  bus: {type: pwm}

# --- Torque check (§4): femur worst case, OFFICIAL SCULPT geometry (D-034) ---
# Static hold ~0.80 N·m (73mm sculpt femur / 6kg / 5-leg share). The shorter sculpt
# leg (vs my 131mm parametric) drops the lever, so EduLite is COMFORTABLE again:
# 1.8 continuous / 0.80 = 2.25x margin (off its x1.2 ceiling), ~7x peak headroom.
torque_check:
  femur_worst_case_nm: 0.80
  continuous_margin: 1.5
  stall_margin: 3.0

# --- Carapace procedural displacement (§4) ---------------------------------
carapace:
  material: PLA
  pieces: 2
  # amp/freq raised from spec's 1.2/0.08 (imperceptible at this scale) for a
  # visibly craggy "made of rocks" look (D-009, movie accuracy).
  noise: {type: simplex, amp_mm: 3.5, freq_per_mm: 0.13, faces: outer_only}

# --- Audio (§4 / §7): chord voice ------------------------------------------
audio:
  driver_mm: 40
  amp: MAX98357A
  bus: i2s
  grilles: 5                   # slotted sound grilles in skirt

# --- IMU (§4): at centroid -------------------------------------------------
imu:
  model: BNO055
  bus: i2c-7
  mount: centroid
  forward_axis: "+X"           # limb 0 heading
