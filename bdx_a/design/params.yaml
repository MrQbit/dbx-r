# BDX-A design parameters — ADOPTED EXACTLY FROM BDX-R (D-007).
#
# BDX-A is BDX-R, unchanged: same full-scale body, same Robstride actuators, same
# 14-DOF kinematics. We do NOT re-derive geometry here — the authoritative model
# is the vendored upstream (fetch via scripts/fetch_upstream.sh):
#   MuJoCo:  third_party/bdx_r_mjlab/.../xmls/bdxr.xml   (host-native, 14 DOF)
#   URDF/USD: third_party/bdx_r_isaaclab/.../data/Robots/BDXR/{URDF.urdf,BDX-R.usd}
# This file is a RECORD of that adoption + the hooks for our improvements
# (wireless charging, training/balancing). Numbers below are read from BDX-R;
# treat the upstream model as law if they ever disagree.

robot: bdx_a
adopted_from:
  repo: github.com/BDX-R/BDX-R-MjLab
  sha: 079acd294650aa149644828723da517eabd808c9
  isaaclab_sha: 62f0ba642fa0225180dc484f3ff195b7052b2a34
  license: [Apache-2.0, MIT]

scale: 1.0                     # full-scale (NOT 0.6x — D-001 dropped by D-007)
actuator_class: robstride      # quasi-direct-drive; NOT STS3215

dimensions:
  base_init_height_m: 0.25     # from bdxr.xml qpos0
  standing_height_m: 0.66      # approx, full-scale droid

# --- DOF (14): 10 legs + 4-DOF head, names/ranges verbatim from BDX-R ---------
# order == obs == action; servo IDs assigned 1..14 in this order.
dof:
  - {name: Left_Hip_Yaw,    servo_id: 1,  limit_rad: [-0.26,  0.26]}
  - {name: Left_Hip_Roll,   servo_id: 2,  limit_rad: [-0.26,  0.35]}
  - {name: Left_Hip_Pitch,  servo_id: 3,  limit_rad: [-1.05,  0.70]}
  - {name: Left_Knee,       servo_id: 4,  limit_rad: [-0.96,  1.31]}
  - {name: Left_Ankle,      servo_id: 5,  limit_rad: [-0.79,  1.22]}
  - {name: Right_Hip_Yaw,   servo_id: 6,  limit_rad: [-0.26,  0.26]}
  - {name: Right_Hip_Roll,  servo_id: 7,  limit_rad: [-0.35,  0.26]}
  - {name: Right_Hip_Pitch, servo_id: 8,  limit_rad: [-0.70,  1.05]}
  - {name: Right_Knee,      servo_id: 9,  limit_rad: [-1.31,  0.96]}
  - {name: Right_Ankle,     servo_id: 10, limit_rad: [-1.22,  0.79]}
  - {name: Neck_Pitch,      servo_id: 11, limit_rad: [-0.35,  0.87]}
  - {name: Head_Pitch,      servo_id: 12, limit_rad: [-1.05,  0.52]}
  - {name: Head_Yaw,        servo_id: 13, limit_rad: [-0.87,  0.87]}
  - {name: Head_Roll,       servo_id: 14, limit_rad: [-0.52,  0.52]}

# --- Our improvements layered on the unchanged BDX-R body ---------------------
improvements:
  wireless_charging: qi_15w    # Qi RX pocket added to the chassis (components.py)
  training: [more_iters, balancing]   # better balance/gait via RL, not geometry
